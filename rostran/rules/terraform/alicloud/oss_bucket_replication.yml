Version: '2020-06-01'
Type: Resource
ResourceType:
  From: alicloud_oss_bucket_replication
  To: ALIYUN::OSS::BucketReplication
Properties:
  action:
    To: ReplicationConfiguration
    Type: Map
  bucket:
    To: BucketName
  destination:
    To: ReplicationConfiguration
    Type: Map
    Schema:
      bucket:
        Ignore: true
      location:
        Ignore: true
      transfer_type:
        Ignore: true
  encryption_configuration:
    To: ReplicationConfiguration
    Type: Map
    Schema:
      replica_kms_key_id:
        Ignore: true
  historical_object_replication:
    To: ReplicationConfiguration
    Type: Map
  prefix_set:
    To: ReplicationConfiguration
    Type: Map
    Schema:
      prefixes:
        Ignore: true
  progress:
    Ignore: true
  rtc:
    To: ReplicationConfiguration
    Type: Map
    Schema:
      enabled:
        Ignore: true
      status:
        Ignore: true
  source_selection_criteria:
    To: ReplicationConfiguration
    Type: Map
    Schema:
      sse_kms_encrypted_objects:
        Ignore: true
  status:
    To: ReplicationConfiguration
    Type: Map
  sync_role:
    To: ReplicationConfiguration
    Type: Map

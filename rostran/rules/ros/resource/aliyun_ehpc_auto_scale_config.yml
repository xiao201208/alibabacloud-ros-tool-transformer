Version: '2020-06-01'
Type: Resource
ResourceType:
  From: ALIYUN::EHPC::AutoScaleConfig
  To: alicloud_ehpc_queue
Properties:
  ClusterId:
    To: cluster_id
  EnableAutoShrink:
    To: enable_scale_in
  EnableAutoGrow:
    To: enable_scale_out
  MaxNodesInCluster:
    To: max_count
  GrowRatio:
    Ignore: true
  ImageId:
    Ignore: true
  ExcludeNodes:
    Ignore: true
  ShrinkIdleTimes:
    Ignore: true
  GrowTimeoutInMinutes:
    Ignore: true
  SpotPriceLimit:
    Ignore: true
  GrowIntervalInMinutes:
    Ignore: true
  Queues:
    Ignore: true
  ExtraNodesGrowRatio:
    Ignore: true
  ShrinkIntervalInMinutes:
    Ignore: true
  SpotStrategy:
    Ignore: true
Attributes:
  ClusterId:
    Ignore: true

name: Build Binary

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-amd64
          - os: macos-latest
            platform: darwin-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev,binary]"
          uv pip install libterraform==0.8.2

      - name: Verify binary packaging helpers
        run: uv run pytest tests/test_build_binary.py

      - name: Resolve build version
        id: build_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
            echo "value=${tag#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          ROSTRAN_BUILD_VERSION: ${{ steps.build_version.outputs.value }}
        run: uv run python build.py

      - name: Smoke test
        run: |
          dist/rostran/rostran --help
          dist/rostran/rostran rules --version

      - name: Verify release version
        if: github.event_name == 'release'
        shell: bash
        run: |
          expected="${{ steps.build_version.outputs.value }}"
          actual="$(dist/rostran/rostran --version)"
          actual="${actual##* }"
          if [ "$actual" != "$expected" ]; then
            echo "Release tag version ($expected) does not match rostran --version ($actual)." >&2
            exit 1
          fi

      - name: Verify archive layout
        shell: bash
        run: |
          archive="$(ls dist/rostran-*.tar.gz)"
          tar -tzf "$archive" | grep -x "rostran/rostran"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: rostran-binary-${{ matrix.platform }}
          path: dist/rostran-*.tar.gz

      - name: Upload version file
        if: matrix.platform == 'linux-amd64'
        uses: actions/upload-artifact@v4
        with:
          name: rostran-version
          path: dist/version.txt

  upload-assets:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            artifacts/rostran-binary-*/* \
            artifacts/rostran-version/version.txt \
            --clobber

      - name: Trigger release webhook
        env:
          RELEASE_WEBHOOK_URL: ${{ secrets.RELEASE_WEBHOOK_URL }}
          RELEASE_WEBHOOK_TOKEN: ${{ secrets.RELEASE_WEBHOOK_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          if [[ -z "${RELEASE_WEBHOOK_URL}" ]]; then
            echo "RELEASE_WEBHOOK_URL is not set; skipping explicit webhook call."
            exit 0
          fi
          if [[ -z "${RELEASE_WEBHOOK_TOKEN}" ]]; then
            echo "RELEASE_WEBHOOK_TOKEN is not set; cannot sign release webhook payload." >&2
            exit 1
          fi

          payload_file=$(mktemp)
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" > /tmp/release.json
          gh api "repos/${GITHUB_REPOSITORY}" > /tmp/repository.json
          jq -n \
            --slurpfile release /tmp/release.json \
            --slurpfile repository /tmp/repository.json \
            '{action: "edited", release: $release[0], repository: $repository[0]}' \
            > "${payload_file}"

          signature=$(openssl dgst -sha256 -hmac "${RELEASE_WEBHOOK_TOKEN}" "${payload_file}" | awk '{print $2}')
          delivery_id=$(uuidgen | tr '[:upper:]' '[:lower:]')
          task_id="${delivery_id}"
          response_file=$(mktemp)

          http_code=$(curl --silent --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 20 \
            --request POST \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Hookshot/${GITHUB_RUN_ID}" \
            -H "X-GitHub-Event: release" \
            -H "X-GitHub-Delivery: ${delivery_id}" \
            -H "X-GitHub-Hook-Installation-Target-Type: repository" \
            -H "X-Hub-Signature-256: sha256=${signature}" \
            -H "X-Fc-Invocation-Type: Async" \
            -H "X-Fc-Async-Task-Id: ${task_id}" \
            --data-binary "@${payload_file}" \
            "${RELEASE_WEBHOOK_URL}")

          case "${http_code}" in
            2*)
              echo "Submitted FC async release sync task ${task_id}."
              cat "${response_file}"
              ;;
            409)
              echo "FC async release sync task ${task_id} was already submitted."
              cat "${response_file}"
              ;;
            *)
              echo "Failed to submit FC async release sync task ${task_id}; HTTP ${http_code}." >&2
              cat "${response_file}" >&2
              exit 1
              ;;
          esac
